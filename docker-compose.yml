version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: goti11_postgres
    environment:
      POSTGRES_USER: goti11_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: goti11_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goti11_user -d goti11_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
